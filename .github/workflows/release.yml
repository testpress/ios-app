name: Release iOS App

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: "Institute subdomain (e.g. demo, myinstitute)"
        required: true
        default: demo
  pull_request:

jobs:
  release:
    runs-on: macos-latest

    env:
      SUBDOMAIN: ${{ github.event_name == 'pull_request' && 'demo' || inputs.subdomain }}
      API_ACCESS_KEY: ${{ secrets.API_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 10
      ZOOM_SDK_URL: "https://static.testpress.in/static/ios/zoom_sdk.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: brew install --quiet imagemagick

      - name: Install signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db
          security default-keychain -s build.keychain

      - name: Verify Environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          carthage version

      - name: Carthage & Zoom SDK Cache
        id: cma-cache
        uses: actions/cache@v4
        with:
          path: Carthage/Build
          key: ${{ runner.os }}-carthage-zoom-v2-${{ hashFiles('Cartfile.resolved') }}-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Setup Dependencies (Carthage & Zoom SDK)
        if: steps.cma-cache.outputs.cache-hit != 'true'
        run: |
          # Bootstrap Carthage
          carthage bootstrap --platform iOS --use-xcframeworks --no-use-binaries
          
          # Download and install Zoom SDK
          mkdir -p Carthage/Build
          curl -L -s -o zoom-sdk.zip "${{ env.ZOOM_SDK_URL }}"
          unzip -q zoom-sdk.zip -d zoom_temp
          cp -R zoom_temp/*.xcframework Carthage/Build/ || true
          rm -rf zoom_temp zoom-sdk.zip
        timeout-minutes: 40

      - name: Release
        run: bundle exec fastlane release_update_to subdomain:${{ env.SUBDOMAIN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-log
          path: ~/Library/Logs/gym/
